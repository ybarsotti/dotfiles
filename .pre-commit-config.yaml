# Pre-commit hooks for the chezmoi dotfiles repo
# Install: pre-commit install
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^dot_config/ccstatusline/settings\.json$
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
        exclude: 'dot_config/zed/.*\.json$'
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: ['-x', '-S', 'warning']
        exclude: '\.zsh$'

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-d', '{extends: relaxed, rules: {line-length: {max: 120}}}']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: act-lint
        name: GitHub Actions — Lint job (act)
        language: system
        entry: bash -c 'export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH" && act push -j lint --container-architecture linux/amd64 -P ubuntu-latest=catthehacker/ubuntu:act-latest'
        pass_filenames: false
        always_run: true

exclude: |
  (?x)^(
    \.chezmoiexternal\.toml|
    \.chezmoitemplates/.*|
    dot_config/yazi/flavors/.*|
    modify_.*|
    .*\.lock|
    .*\.min\..*|
    .*\.png|
    .*\.wasm
  )$
