---
# MCP servers separated by account type.
# - shared: loaded on all machines (personal + work)
# - personal: loaded only when machine.purpose = "personal"
# - work: loaded only when machine.purpose = "work"

mcp_servers:
  shared:
    ai-memory:
      type: http
      url: http://127.0.0.1:49374/mcp

    memory:
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-memory"

    sequential-thinking:
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-sequential-thinking"

    gitnexus:
      command: npx
      args:
        - -y
        - gitnexus@latest
        - mcp

    caveman-shrink:
      command: npx
      args:
        - -y
        - caveman-shrink

    serena:
      command: uvx
      args:
        - --from
        - git+https://github.com/oraios/serena
        - serena
        - start-mcp-server
        - --context
        - claude-code
        - --project-from-cwd

  personal:
    ccusage:
      command: npx
      args:
        - "@ccusage/mcp@latest"

  work:
    atlassian:
      type: http
      url: https://mcp.atlassian.com/v1/mcp/authv2

    slack:
      type: http
      url: https://mcp.slack.com/mcp
      oauth:
        clientId: "1601185624273.8899143856786"
        callbackPort: 3118

    notetaker:
      command: /Users/barsotti/.local/bin/uv
      args:
        - --directory
        - /Users/barsotti/Developer/Pers/notetaker
        - run
        - notetaker
        - mcp
        - --api-url
        - http://127.0.0.1:8742

