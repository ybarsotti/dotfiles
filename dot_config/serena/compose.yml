services:
  serena:
    image: ghcr.io/oraios/serena:latest
    restart: unless-stopped
    ports:
      - "${SERENA_PORT:-9121}:9121"           # MCP SSE server
      - "${SERENA_DASHBOARD_PORT:-24282}:24282" # Web dashboard
    environment:
      - SERENA_DOCKER=1
    volumes:
      # Serena config & logs (persisted across restarts)
      - ~/.config/serena:/workspaces/serena/config
      # Projects
      - ~/Developer/Work/AppImobiliária/minha-morada:/workspaces/projects/minha-morada
    command: >
      uv run --directory . serena-mcp-server
      --transport sse
      --port 9121
      --host 0.0.0.0
      --context claude-code
