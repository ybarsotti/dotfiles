name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          else
            apt-get update && apt-get install -y shellcheck
          fi

      - name: Install yamllint
        run: pip install --break-system-packages yamllint || pip install yamllint

      - name: Shellcheck — .sh files
        run: |
          find . -name "*.sh" -type f -not -path "*/.git/*" -print0 \
            | xargs -0 -r shellcheck

      - name: Shellcheck — .sh.tmpl files (strip Go template lines)
        run: |
          find . -name "*.sh.tmpl" -type f -not -path "*/.git/*" | while read -r f; do
            echo "Checking $f ..."
            # Strip lines that are pure Go template directives and feed the rest to shellcheck
            grep -v '^\s*{{' "$f" | shellcheck -s bash --severity=error -
          done

      - name: yamllint — packages.yaml
        run: yamllint -d relaxed .chezmoidata/packages.yaml

      - name: Gitleaks — detect secrets
        if: ${{ !env.ACT }}
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-fresh-install:
    name: Fresh Install
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t chezmoi-test -f .github/Dockerfile .

      - name: Run fresh install test
        run: docker run --rm chezmoi-test /home/testuser/.local/share/chezmoi/.github/test-scripts/test-fresh-install.sh

  test-idempotency:
    name: Idempotency
    runs-on: ubuntu-latest
    needs: test-fresh-install
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t chezmoi-test -f .github/Dockerfile .

      - name: Run idempotency test
        run: docker run --rm chezmoi-test /home/testuser/.local/share/chezmoi/.github/test-scripts/test-idempotency.sh
